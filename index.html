<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📷 バーコードスキャナー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Maru Gothic Pro", sans-serif;
      background: #1a1a2e;
      color: #fff;
      text-align: center;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      touch-action: manipulation;
    }
    h2 { font-size: 1.3em; margin-bottom: 10px; }
    .mode-info { font-size: 0.9em; color: #aaa; margin-bottom: 12px; }

    #camera-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      border-radius: 15px;
      overflow: hidden;
      border: 4px solid #4fc3f7;
      background: #000;
    }
    #camera-container video {
      width: 100% !important;
      height: auto !important;
      display: block;
    }
    #camera-container canvas.drawingBuffer {
      display: none !important;
    }

    .scan-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 5;
    }
    .scan-line {
      position: absolute;
      left: 8%; width: 84%; height: 3px;
      background: linear-gradient(90deg, transparent, #4fc3f7, #81d4fa, #4fc3f7, transparent);
      box-shadow: 0 0 12px #4fc3f7;
      animation: scanMove 1.5s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%, 100% { top: 30%; }
      50% { top: 70%; }
    }

    #status {
      margin-top: 12px;
      font-size: 1.05em;
      font-weight: bold;
      color: #4fc3f7;
      min-height: 1.5em;
    }

    .btn {
      background: #4fc3f7; color: #1a1a2e;
      border: none; padding: 12px 30px; border-radius: 30px;
      font-size: 1em; font-weight: bold; cursor: pointer;
      margin-top: 12px; transition: 0.15s; touch-action: manipulation;
    }
    .btn:active { transform: scale(0.95); opacity: 0.8; }
    .btn-danger { background: #ef5350; color: #fff; }
    .btn-retry { background: #78909c; color: #fff; font-size: 0.85em; padding: 8px 20px; margin-top: 8px; }

    #result-area {
      display: none; margin-top: 20px;
      background: rgba(255,255,255,0.1);
      padding: 20px; border-radius: 15px;
      width: 100%; max-width: 350px;
    }
    .success-icon { font-size: 3em; margin-bottom: 10px; animation: popIn 0.3s; }
    #result-text { font-size: 1.2em; font-weight: bold; color: #81c784; word-break: break-all; }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .footer-note { margin-top: 15px; font-size: 0.7em; color: #555; }
  </style>
</head>
<body>

  <div id="scan-view">
    <h2>📷 バーコードスキャナー</h2>
    <div class="mode-info">本のバーコードを カメラにうつしてね</div>

    <div id="camera-container">
      <div class="scan-overlay">
        <div class="scan-line"></div>
      </div>
    </div>

    <div id="status">カメラ じゅんび中...</div>
    <button class="btn btn-retry" onclick="retryCamera()">🔄 カメラがうつらないとき</button>
    <br>
    <button class="btn btn-danger" onclick="cancelAndClose()">✕ とじる</button>
  </div>

  <div id="result-area">
    <div class="success-icon">✅</div>
    <div id="result-text"></div>
    <p style="margin-top:10px; font-size:0.9em; color:#aaa;">じどうで もどります...</p>
  </div>

  <div class="footer-note">バーコードを カメラのまん中にうつしてね</div>

  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
  <script>
    let isScanning = true;

    // ==========================================
    //  Quagga 起動
    // ==========================================
    function startScanner() {
      Quagga.init({
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: document.querySelector('#camera-container'),
          constraints: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          area: {
            top: "20%",
            right: "5%",
            left: "5%",
            bottom: "20%"
          }
        },
        frequency: 15,
        locate: true,
        locator: {
          patchSize: "medium",
          halfSample: true
        },
        decoder: {
          readers: ["ean_reader", "ean_8_reader"]
        }
      }, function(err) {
        if (err) {
          console.error("Quagga init error:", err);
          document.getElementById('status').innerText = 'カメラが使えません 😢';
          return;
        }
        Quagga.start();
        document.getElementById('status').innerText = 'バーコードをうつしてね';
      });

      // 読み取り成功
      Quagga.onDetected(function(result) {
        if (!isScanning) return;

        var code = result.codeResult.code;
        if (!code) return;

        var cleaned = code.replace(/[^0-9]/g, '');
        if (cleaned.length >= 10) {
          isScanning = false;
          playBeep();
          sendResult(cleaned);
        }
      });
    }

    // ==========================================
    //  結果送信 & 閉じる
    // ==========================================
    function sendResult(isbn) {
      Quagga.stop();

      document.getElementById('scan-view').style.display = 'none';
      document.getElementById('result-area').style.display = 'block';
      document.getElementById('result-text').innerText = 'ISBN: ' + isbn;

      if (window.opener) {
        window.opener.postMessage({
          type: 'barcode-scan',
          data: isbn
        }, '*');
      }

      setTimeout(function() {
        window.close();
      }, 800);
    }

    // ==========================================
    //  キャンセル
    // ==========================================
    function cancelAndClose() {
      try { Quagga.stop(); } catch(e) {}
      if (window.opener) {
        window.opener.postMessage({ type: 'scanner-cancel' }, '*');
      }
      window.close();
    }

    // ==========================================
    //  カメラ再起動
    // ==========================================
    function retryCamera() {
      document.getElementById('status').innerText = 'カメラをなおしています...';
      try { Quagga.stop(); } catch(e) {}
      isScanning = true;
      setTimeout(startScanner, 500);
    }

    // ==========================================
    //  効果音
    // ==========================================
    function playBeep() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        [880, 1320].forEach(function(freq, i) {
          var o = ctx.createOscillator();
          var g = ctx.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
          g.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.1);
          g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.1 + 0.3);
          o.connect(g);
          g.connect(ctx.destination);
          o.start(ctx.currentTime + i * 0.1);
          o.stop(ctx.currentTime + i * 0.1 + 0.3);
        });
      } catch(e) {}
    }

    // ==========================================
    //  ページ離脱時
    // ==========================================
    window.addEventListener('beforeunload', function() {
      try { Quagga.stop(); } catch(e) {}
    });

    // ==========================================
    //  起動
    // ==========================================
    window.onload = function() {
      startScanner();
    };
  </script>
</body>
</html>
