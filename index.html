<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📷 スキャナー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Maru Gothic Pro", "Rounded Mplus 1c", sans-serif;
      background: #1a1a2e;
      color: #fff;
      text-align: center;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      touch-action: manipulation;
    }

    h2 { font-size: 1.3em; margin-bottom: 8px; }

    .mode-info {
      font-size: 0.85em;
      color: #aaa;
      margin-bottom: 12px;
    }

    /* カメラ映像エリア */
    .camera-wrap {
      position: relative;
      width: 100%;
      max-width: 360px;
      border-radius: 15px;
      overflow: hidden;
      border: 4px solid #4fc3f7;
      background: #000;
    }

    #video {
      width: 100%;
      display: block;
    }

    /* スキャンライン演出 */
    .scan-line {
      position: absolute;
      left: 10%;
      width: 80%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #4fc3f7, #81d4fa, #4fc3f7, transparent);
      box-shadow: 0 0 12px #4fc3f7;
      animation: scanMove 1.5s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes scanMove {
      0%, 100% { top: 25%; }
      50% { top: 75%; }
    }

    /* 読み取りエリアガイド */
    .scan-guide {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      height: 35%;
      border: 2px solid rgba(79, 195, 247, 0.6);
      border-radius: 8px;
      z-index: 1;
    }
    .scan-guide::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      border: 2px solid transparent;
      border-top-color: #4fc3f7;
      border-bottom-color: #4fc3f7;
      border-radius: 8px;
    }

    #status {
      margin-top: 12px;
      font-size: 1em;
      font-weight: bold;
      color: #4fc3f7;
      min-height: 1.5em;
    }

    .btn {
      background: #4fc3f7;
      color: #1a1a2e;
      border: none;
      padding: 12px 30px;
      border-radius: 30px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
      transition: 0.15s;
      touch-action: manipulation;
    }
    .btn:active { transform: scale(0.95); opacity: 0.8; }
    .btn-danger { background: #ef5350; color: #fff; }
    .btn-retry { background: #78909c; color: #fff; font-size: 0.85em; padding: 8px 20px; margin-top: 8px; }

    /* 成功時 */
    #result-area {
      display: none;
      margin-top: 20px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      width: 100%;
      max-width: 350px;
    }
    .success-icon { font-size: 3em; margin-bottom: 10px; animation: popIn 0.3s; }
    #result-text { font-size: 1.2em; font-weight: bold; color: #81c784; word-break: break-all; }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .footer-note { margin-top: 15px; font-size: 0.7em; color: #555; }

    /* canvas は非表示 */
    #canvas { display: none; }
  </style>
</head>
<body>

  <!-- スキャン中の画面 -->
  <div id="scan-view">
    <h2 id="scan-title">📷 バーコードスキャナー</h2>
    <div id="mode-label" class="mode-info"></div>

    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-line"></div>
      <div class="scan-guide"></div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="status">カメラ じゅんび中...</div>
    <button class="btn btn-retry" onclick="retryCamera()">🔄 カメラがうつらないとき</button>
    <br>
    <button class="btn btn-danger" onclick="cancelAndClose()">✕ とじる</button>
  </div>

  <!-- 読み取り成功の画面 -->
  <div id="result-area">
    <div class="success-icon">✅</div>
    <div id="result-text"></div>
    <p style="margin-top:10px; font-size:0.9em; color:#aaa;">じどうで もどります...</p>
  </div>

  <div class="footer-note">バーコードを カメラのまん中にうつしてね</div>

  <!-- ZXing ライブラリ読み込み -->
  <script type="text/javascript" src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>

  <script>
    // ==========================================
    //  URLパラメータからモードを取得
    // ==========================================
    const params = new URLSearchParams(window.location.search);
    const MODE = params.get('mode') || 'barcode'; // 'barcode' or 'qr'

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let codeReader = null;
    let scanInterval = null;
    let stream = null;
    let isScanning = true;

    // ==========================================
    //  初期表示
    // ==========================================
    if (MODE === 'qr') {
      document.getElementById('scan-title').innerText = '📷 QRコードリーダー';
      document.getElementById('mode-label').innerText = 'QRコードを カメラにうつしてね';
    } else {
      document.getElementById('scan-title').innerText = '📷 バーコードスキャナー';
      document.getElementById('mode-label').innerText = '本のバーコードを カメラにうつしてね';
    }

    // ==========================================
    //  ZXing リーダー初期化
    // ==========================================
    function initReader() {
      const hints = new Map();

      if (MODE === 'qr') {
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
          ZXing.BarcodeFormat.QR_CODE
        ]);
      } else {
        // バーコード：EAN-13 / EAN-8 のみ（ISBN用）
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
          ZXing.BarcodeFormat.EAN_13,
          ZXing.BarcodeFormat.EAN_8
        ]);
      }

      // TRY_HARDER を有効にすると精度UP（速度とのトレードオフだが効果大）
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

      codeReader = new ZXing.MultiFormatReader();
      codeReader.setHints(hints);
    }

    // ==========================================
    //  カメラ起動
    // ==========================================
    async function startCamera() {
      try {
        // HD解像度 + オートフォーカス（continuous）を指定
        const constraints = {
          video: {
            facingMode: 'environment',
            width: { ideal: 1280 },
            height: { ideal: 720 },
            focusMode: { ideal: 'continuous' }
          },
          audio: false
        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;

        video.onloadedmetadata = () => {
          video.play();
          // canvasサイズをカメラ解像度に合わせる
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;

          document.getElementById('status').innerText =
            MODE === 'qr' ? 'QRをかざしてね' : 'バーコードをうつしてね';

          // スキャン開始（100msごと = 10回/秒）
          startScanLoop();
        };

      } catch (err) {
        console.error('Camera error:', err);

        // フォールバック：最小限の制約でリトライ
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' },
            audio: false
          });
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            video.play();
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            document.getElementById('status').innerText =
              MODE === 'qr' ? 'QRをかざしてね' : 'バーコードをうつしてね';
            startScanLoop();
          };
        } catch (err2) {
          console.error('Camera fallback error:', err2);
          document.getElementById('status').innerText = 'カメラが使えません 😢';
        }
      }
    }

    // ==========================================
    //  スキャンループ（高速：100ms間隔）
    // ==========================================
    function startScanLoop() {
      if (scanInterval) clearInterval(scanInterval);

      scanInterval = setInterval(() => {
        if (!isScanning) return;
        if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

        // カメラ映像をcanvasに描画
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        try {
          // canvasからピクセルデータを取得
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const luminanceSource = new ZXing.RGBLuminanceSource(
            new Uint8ClampedArray(imageData.data.buffer),
            canvas.width,
            canvas.height
          );
          const binaryBitmap = new ZXing.BinaryBitmap(
            new ZXing.HybridBinarizer(luminanceSource)
          );

          // デコード実行
          const result = codeReader.decode(binaryBitmap);

          if (result) {
            const text = result.getText();
            onScanSuccess(text);
          }
        } catch (e) {
          // NotFoundException は毎フレーム出るので無視
          if (!(e instanceof ZXing.NotFoundException)) {
            // その他のエラーも基本無視（ChecksumException等）
          }
        }
      }, 100); // 100ms = 10fps
    }

    // ==========================================
    //  読み取り成功時
    // ==========================================
    function onScanSuccess(decodedText) {
      if (!isScanning) return;

      if (MODE === 'qr') {
        if (decodedText.startsWith('u-')) {
          isScanning = false;
          const userId = decodedText.replace('u-', '');
          playBeep();
          showResult('ID: ' + userId, userId, 'qr-login');
        }
      } else {
        const cleaned = decodedText.replace(/[^0-9]/g, '');
        if (cleaned.length >= 10) {
          isScanning = false;
          playBeep();
          showResult('ISBN: ' + cleaned, cleaned, 'barcode-scan');
        }
      }
    }

    // ==========================================
    //  結果表示 & 送信
    // ==========================================
    function showResult(displayText, data, type) {
      // スキャン停止
      stopScanLoop();

      // UI更新
      document.getElementById('scan-view').style.display = 'none';
      document.getElementById('result-area').style.display = 'block';
      document.getElementById('result-text').innerText = displayText;

      // 親ウィンドウにデータ送信
      if (window.opener) {
        window.opener.postMessage({ type: type, data: data }, '*');
      }

      // 少し待ってから自動で閉じる
      setTimeout(() => {
        stopCamera();
        window.close();
      }, 800);
    }

    // ==========================================
    //  キャンセル
    // ==========================================
    function cancelAndClose() {
      if (window.opener) {
        window.opener.postMessage({ type: 'scanner-cancel' }, '*');
      }
      stopCamera();
      window.close();
    }

    // ==========================================
    //  カメラ再起動
    // ==========================================
    function retryCamera() {
      document.getElementById('status').innerText = 'カメラをなおしています...';
      stopCamera();
      isScanning = true;
      setTimeout(() => {
        startCamera();
      }, 500);
    }

    // ==========================================
    //  停止系
    // ==========================================
    function stopScanLoop() {
      if (scanInterval) {
        clearInterval(scanInterval);
        scanInterval = null;
      }
    }

    function stopCamera() {
      stopScanLoop();
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
    }

    // ==========================================
    //  効果音
    // ==========================================
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        // 2音のチャイム風
        [880, 1320].forEach((freq, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
          g.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.1);
          g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.1 + 0.3);
          o.connect(g);
          g.connect(ctx.destination);
          o.start(ctx.currentTime + i * 0.1);
          o.stop(ctx.currentTime + i * 0.1 + 0.3);
        });
      } catch(e) {}
    }

    // ==========================================
    //  ページ離脱時
    // ==========================================
    window.addEventListener('beforeunload', () => {
      stopCamera();
    });

    // ==========================================
    //  起動
    // ==========================================
    window.onload = function() {
      initReader();
      startCamera();
    };
  </script>
</body>
</html>
